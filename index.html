<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manajemen Mahasiswa</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 shadow-sm border-0 auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex bg-primary-subtle rounded-circle p-3 mb-3">
                    <i class="bi bi-person-badge text-primary fs-2"></i>
                </div>
                <h3 class="fw-bold">Sisfo Mahasiswa</h3>
                <p class="text-muted small">Login admin dashboard</p>
            </div>
            <form id="loginForm">

                <div id="loginAlert" class="alert d-none py-2" role="alert">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium text-muted small">
                        <i class="bi bi-person me-1"></i>
                        USERNAME
                    </label>

                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium text-muted small">
                        <i class="bi bi-lock me-1"></i>
                        PASSWORD
                    </label>

                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">

                    Masuk
                    <i class="bi bi-arrow-right ms-2"></i>
                </button>

            </form>
        </div>
    </div>
    <!-- Footer -->
    <footer class="bg-white border-top py-1 fixed-bottom shadow-sm">
        <div class="container-fluid text-center">
            <small class="text-muted">
                <i class="bi bi-code-slash me-1"></i>
                Developed by <strong>Abdul Goni Murod</strong> • © 2026
            </small>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
</body>

</html>
